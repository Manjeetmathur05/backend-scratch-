<!DOCTYPE html>
<html>
<head>
  <title>Deal Fusion Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color:white;
      text-align:center;
    }

    h1 {
      margin-top:20px;
      font-size:28px;
    }

    .container {
      max-width:350px;
      margin:auto;
      padding:20px;
      backdrop-filter: blur(15px);
    }

    input {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:none;
      margin-top:15px;
      text-align:center;
      font-size:16px;
    }

    .card {
      margin-top:25px;
      width:100%;
      height:160px;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    canvas {
      position:absolute;
      top:0;
      left:0;
    }

    #rewardText {
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      color:#22c55e;
      text-shadow:0 0 10px rgba(34,197,94,0.8);
    }

    #result {
      margin-top:20px;
      font-size:20px;
      color:#facc15;
    }

    .btn {
      margin-top:15px;
      padding:12px;
      border:none;
      border-radius:12px;
      background:#22c55e;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .btn:hover {
      background:#16a34a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎁 Deal Fusion Rewards</h1>

  <input type="text" id="userId" placeholder="Enter mobile number">

  <div class="card" id="card">
    <div id="rewardText">Scratch & Win 💰</div>
    <canvas id="canvas" width="300" height="160"></canvas>
  </div>

  <p id="result"></p>
</div>

<script src="script.js"></script>

</body>
</html>
